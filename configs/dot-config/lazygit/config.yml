os:
  edit: >-
    [ -z "$NVIM" ]
    && (nvim -- {{filename}})
    || (nvim --server "$NVIM" --remote-send "q"
    && nvim --server "$NVIM" --remote {{filename}})
  editAtLine: >-
    [ -z "$NVIM" ]
    && (nvim +{{line}} -- {{filename}})
    || (nvim --server "$NVIM" --remote-send "q"
    && nvim --server "$NVIM" --remote {{filename}}
    && nvim --server "$NVIM" --remote-send ":{{line}} ")

gui:
  language: 'en'
  nerdFontsVersion: '3'

git:
  mainBranches:
    - master
    - main
  skipHookPrefix: WIP

keybinding:
  universal:
    scrollUpMain-alt1: <disabled>
    scrollDownMain-alt1: <disabled>
  commits:
    moveDownCommit: J
    moveUpCommit: K
